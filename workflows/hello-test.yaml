name: hello-test
version: "1.0"
description: Simple deterministic test workflow
swarm:
  pattern: pipeline
  maxConcurrency: 1
  timeoutMs: 60000
agents: []
workflows:
  - name: hello-flow
    steps:
      - name: greet
        type: deterministic
        command: "echo 'Hello from Agent Relay cloud!'"
        captureOutput: true
errorHandling:
  strategy: fail-fast
