name: Relayfile Evals

on:
  pull_request:
    paths:
      - ".github/workflows/relayfile-evals.yml"
      - "AGENTS.md"
      - "README.md"
      - "cmd/**"
      - "docs/**"
      - "evals/**"
      - "internal/**"
      - "openapi/**"
      - "packages/**"
      - "schemas/**"
      - "scripts/evals/**"
      - "testdata/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/relayfile-evals.yml"
      - "AGENTS.md"
      - "README.md"
      - "cmd/**"
      - "docs/**"
      - "evals/**"
      - "internal/**"
      - "openapi/**"
      - "packages/**"
      - "schemas/**"
      - "scripts/evals/**"
      - "testdata/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: relayfile-evals-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "22"
  NPM_CONFIG_FUND: "false"
  RELAYFILE_EVAL_OPENROUTER_MODEL: openai/gpt-oss-120b:free

jobs:
  evals:
    name: Provider-backed evals
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Relayfile packages
        run: npm run build

      - name: Require OpenRouter API key
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "OPENROUTER_API_KEY GitHub secret is required for provider-backed Relayfile evals."
            exit 1
          fi

      - name: Run provider evals
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm run evals:provider -- --suite provider-readiness --trials 1

      - name: Summarize evals
        if: always()
        run: node scripts/evals/ci-summary.mjs

      - name: Comment human-review cases
        if: always() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/evals/ci-review-comment.mjs

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relayfile-eval-run
          path: .relayfile/evals/runs/
          retention-days: 14
          if-no-files-found: ignore
