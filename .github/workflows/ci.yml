name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run Go tests
        run: go test ./...

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build relayfile
        run: go build ./cmd/relayfile

      - name: Build relayfile-mount
        run: go build ./cmd/relayfile-mount

      - name: Build relayfile-cli
        run: go build ./cmd/relayfile-cli

  sdk-typecheck:
    name: SDK Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/relayfile-sdk/package-lock.json

      - name: Install SDK dependencies
        working-directory: packages/relayfile-sdk
        run: npm ci

      - name: Build SDK
        working-directory: packages/relayfile-sdk
        run: npm run build

      - name: Typecheck SDK
        working-directory: packages/relayfile-sdk
        run: npx tsc --noEmit

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run E2E suite
        env:
          CI: "true"
        run: |
          # scripts/e2e.ts builds and starts relayfile/relayfile-mount internally.
          npx tsx scripts/e2e.ts --ci

  workers-typecheck:
    name: Workers Typecheck
    if: ${{ hashFiles('packages/server/tsconfig.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install worker dependencies
        working-directory: packages/server
        run: npm ci

      - name: Typecheck workers
        working-directory: packages/server
        run: npx tsc --noEmit
