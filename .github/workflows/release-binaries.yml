name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.22"
  REGISTRY_IMAGE: ghcr.io/agentworkforce/relayfile

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cross-compile binaries
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o "dist/relayfile-${GOOS}-${GOARCH}" ./cmd/relayfile
          go build -o "dist/relayfile-mount-${GOOS}-${GOARCH}" ./cmd/relayfile-mount
          go build -o "dist/relayfile-cli-${GOOS}-${GOARCH}" ./cmd/relayfile-cli

      - name: Generate SHA256 checksums
        working-directory: dist
        run: |
          shasum -a 256 \
            "relayfile-${{ matrix.goos }}-${{ matrix.goarch }}" \
            "relayfile-mount-${{ matrix.goos }}-${{ matrix.goarch }}" \
            "relayfile-cli-${{ matrix.goos }}-${{ matrix.goarch }}" \
            > "checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/relayfile-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/relayfile-mount-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/relayfile-cli-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: ls -lah release-assets

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:latest
            ${{ env.REGISTRY_IMAGE }}:${{ github.ref_name }}
