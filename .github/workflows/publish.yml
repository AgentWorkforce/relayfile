name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - all
          - core
          - sdk
          - agents
          - cli
          - file-observer
          - local-mount
          - mount-darwin-arm64
          - mount-darwin-x64
          - mount-linux-arm64
          - mount-linux-x64
        default: "all"
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      custom_version:
        description: "Custom version (optional, overrides version type)"
        required: false
        type: string
      preid:
        description: "Prerelease identifier (used with pre* version types)"
        required: false
        type: choice
        options:
          - beta
          - alpha
          - rc
        default: "beta"
      dry_run:
        description: "Dry run (do not actually publish)"
        required: false
        type: boolean
        default: false
      tag:
        description: "NPM dist-tag"
        required: false
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha
        default: "latest"

concurrency:
  group: publish-package
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  NPM_CONFIG_FUND: false

jobs:
  # Build all packages once, version them, and upload
  build:
    name: Build & Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      is_prerelease: ${{ steps.bump.outputs.is_prerelease }}

    steps:
      - name: Validate release mode
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.package }}" != "all" ] && [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            cat >&2 <<'EOF'
          ERROR: the publish workflow version-bumps every @relayfile package, and
          release lockfile regeneration needs every @relayfile/mount-* package at
          the new version to have been published so npm can resolve tarball
          integrity metadata. Run the release with package=all, or split
          single-package releases into a workflow that does not rewrite all
          package manifests and lockfiles.
          EOF
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Check SDK parity
        run: node scripts/check-sdk-parity.mjs

      - name: Version all packages
        id: bump
        run: |
          CUSTOM_VERSION="${{ github.event.inputs.custom_version }}"
          VERSION_TYPE="${{ github.event.inputs.version }}"
          PREID="${{ github.event.inputs.preid }}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          if [ -n "$CUSTOM_VERSION" ]; then
            echo "Setting version to custom value: $CUSTOM_VERSION"
            npm version "$CUSTOM_VERSION" --no-git-tag-version --allow-same-version
          else
            echo "Bumping version: $VERSION_TYPE (preid=$PREID)"
            npm version "$VERSION_TYPE" --no-git-tag-version --preid="$PREID"
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

          if [[ "$NEW_VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          # Sync all package versions and internal dependencies
          node -e "
            const fs = require('fs');
            const path = require('path');
            const version = '$NEW_VERSION';

            const packagePaths = [
              'packages/core/package.json',
              'packages/sdk/typescript/package.json',
              'packages/agents/package.json',
              'packages/cli/package.json',
              'packages/file-observer/package.json',
              'packages/local-mount/package.json',
              'packages/mount-darwin-arm64/package.json',
              'packages/mount-darwin-x64/package.json',
              'packages/mount-linux-arm64/package.json',
              'packages/mount-linux-x64/package.json',
            ];

            for (const pkgPath of packagePaths) {
              if (fs.existsSync(pkgPath)) {
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                pkg.version = version;
                console.log(pkg.name + ' -> v' + version);
                for (const depType of ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies']) {
                  for (const dep of Object.keys(pkg[depType] || {})) {
                    if (dep.startsWith('@relayfile/')) {
                      // Internal deps pin to exact version (existing convention);
                      // peerDependencies use caret so consumers retain flexibility
                      // (e.g. a future 0.11.x agents must still admit any 0.11.x sdk,
                      // not break under 0.x semver as it would with the previous
                      // peer string left untouched).
                      pkg[depType][dep] = depType === 'peerDependencies' ? '^' + version : version;
                    }
                  }
                }
                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              }
            }
          "

      # Rename each package's `## [Unreleased]` section to `## [X.Y.Z] - <today>`
      # and reopen an empty Unreleased section. Skipped on prereleases and dry
      # runs — prereleases would fragment a single logical release into many
      # changelog entries, and dry runs must not mutate files.
      - name: Finalize CHANGELOGs
        if: |
          steps.bump.outputs.is_prerelease == 'false' &&
          github.event.inputs.dry_run != 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/finalize-changelogs.mjs "${{ steps.bump.outputs.new_version }}"

      - name: Build packages
        run: |
          npm run build --workspace=packages/core
          npm run build --workspace=packages/sdk/typescript
          npm run build --workspace=packages/agents
          npm run build --workspace=packages/cli
          npm run build --workspace=packages/local-mount
          npm ci --prefix packages/file-observer
          npm run pages:build --prefix packages/file-observer

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            package.json
            packages/core/package.json
            packages/core/dist/
            packages/core/CHANGELOG.md
            packages/sdk/typescript/package.json
            packages/sdk/typescript/dist/
            packages/sdk/typescript/CHANGELOG.md
            packages/agents/package.json
            packages/agents/dist/
            packages/agents/CHANGELOG.md
            packages/cli/package.json
            packages/cli/bin/
            packages/cli/CHANGELOG.md
            packages/file-observer/package.json
            packages/file-observer/CHANGELOG.md
            packages/local-mount/package.json
            packages/local-mount/dist/
            packages/local-mount/CHANGELOG.md
            packages/mount-darwin-arm64/package.json
            packages/mount-darwin-arm64/README.md
            packages/mount-darwin-arm64/bin/.gitkeep
            packages/mount-darwin-x64/package.json
            packages/mount-darwin-x64/README.md
            packages/mount-darwin-x64/bin/.gitkeep
            packages/mount-linux-arm64/package.json
            packages/mount-linux-arm64/README.md
            packages/mount-linux-arm64/bin/.gitkeep
            packages/mount-linux-x64/package.json
            packages/mount-linux-x64/README.md
            packages/mount-linux-x64/bin/.gitkeep
          retention-days: 1

  # Cross-compile relayfile-mount for every consumer-supported platform.
  # These are attached to the GitHub Release so downstream consumers (e.g.
  # the cloud Daytona snapshot rebuild) can pin a specific published version
  # instead of building from source.
  build-mount-binaries:
    name: Build relayfile-mount (${{ matrix.suffix }})
    needs: build
    runs-on: ${{ matrix.runner }}
    if: github.event.inputs.dry_run != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-amd64
            goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - suffix: linux-arm64
            goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - suffix: darwin-amd64
            goos: darwin
            goarch: amd64
            runner: macos-latest
          - suffix: darwin-arm64
            goos: darwin
            goarch: arm64
            runner: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build relayfile-mount
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.build.outputs.new_version }}
        run: |
          set -euo pipefail
          OUT="relayfile-mount-${{ matrix.suffix }}"
          go build \
            -ldflags="-s -w -X main.version=v${VERSION}" \
            -o "${OUT}" \
            ./cmd/relayfile-mount
          SIZE=$(stat -f%z "${OUT}" 2>/dev/null || stat -c%s "${OUT}")
          echo "Built ${OUT} (${SIZE} bytes, v${VERSION})"
          if [ "${SIZE}" -lt 1048576 ]; then
            echo "ERROR: binary is suspiciously small (< 1MB)" >&2
            exit 1
          fi

      - name: Smoke-test binary (matching runner only)
        if: |
          (matrix.goos == 'linux' && matrix.goarch == 'amd64') ||
          (matrix.goos == 'darwin' && matrix.goarch == 'arm64')
        run: ./relayfile-mount-${{ matrix.suffix }} --help | head -20

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: relayfile-mount-${{ matrix.suffix }}
          path: relayfile-mount-${{ matrix.suffix }}
          retention-days: 1

  # Publish all packages in parallel
  publish-packages:
    name: Publish ${{ matrix.package }}
    needs: [build, build-mount-binaries]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event.inputs.package == 'all' &&
      needs.build.result == 'success' &&
      (github.event.inputs.dry_run == 'true' || needs.build-mount-binaries.result == 'success')
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include:
          - package: core
            path: packages/core
            mount_binary: ""
          - package: sdk
            path: packages/sdk/typescript
            mount_binary: ""
          - package: agents
            path: packages/agents
            mount_binary: ""
          - package: cli
            path: packages/cli
            mount_binary: ""
          - package: file-observer
            path: packages/file-observer
            mount_binary: ""
          - package: local-mount
            path: packages/local-mount
            mount_binary: ""
          - package: mount-darwin-arm64
            path: packages/mount-darwin-arm64
            mount_binary: relayfile-mount-darwin-arm64
          - package: mount-darwin-x64
            path: packages/mount-darwin-x64
            mount_binary: relayfile-mount-darwin-amd64
          - package: mount-linux-arm64
            path: packages/mount-linux-arm64
            mount_binary: relayfile-mount-linux-arm64
          - package: mount-linux-x64
            path: packages/mount-linux-x64
            mount_binary: relayfile-mount-linux-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Restore CLI binary permissions
        if: matrix.package == 'cli'
        run: chmod 755 packages/cli/bin/relayfile-cli-*

      - name: Download relayfile-mount binary
        if: matrix.mount_binary != '' && github.event.inputs.dry_run != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.mount_binary }}
          path: /tmp/relayfile-mount-binary

      - name: Prepare mount platform package
        if: matrix.mount_binary != '' && github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          mkdir -p "${{ matrix.path }}/bin"
          cp "/tmp/relayfile-mount-binary/${{ matrix.mount_binary }}" "${{ matrix.path }}/bin/relayfile-mount"
          chmod 755 "${{ matrix.path }}/bin/relayfile-mount"

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Dry run check
        if: github.event.inputs.dry_run == 'true'
        working-directory: ${{ matrix.path }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Dry run - would publish ${PACKAGE_NAME}"
          npm publish --dry-run --access public --tag ${{ github.event.inputs.tag }} --ignore-scripts

      - name: Publish to NPM
        if: github.event.inputs.dry_run != 'true'
        working-directory: ${{ matrix.path }}
        run: npm publish --access public --provenance --tag ${{ github.event.inputs.tag }} --ignore-scripts

  # Publish single package (when not 'all')
  publish-single:
    name: Publish single package
    needs: [build, build-mount-binaries]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event.inputs.package != 'all' &&
      needs.build.result == 'success' &&
      (github.event.inputs.dry_run == 'true' || needs.build-mount-binaries.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Restore CLI binary permissions
        if: github.event.inputs.package == 'cli'
        run: chmod 755 packages/cli/bin/relayfile-cli-*

      - name: Resolve package path
        id: resolve-package
        run: |
          case "${{ github.event.inputs.package }}" in
            core) echo "path=packages/core" >> "$GITHUB_OUTPUT"; echo "mount_binary=" >> "$GITHUB_OUTPUT" ;;
            sdk) echo "path=packages/sdk/typescript" >> "$GITHUB_OUTPUT"; echo "mount_binary=" >> "$GITHUB_OUTPUT" ;;
            agents) echo "path=packages/agents" >> "$GITHUB_OUTPUT"; echo "mount_binary=" >> "$GITHUB_OUTPUT" ;;
            cli) echo "path=packages/cli" >> "$GITHUB_OUTPUT"; echo "mount_binary=" >> "$GITHUB_OUTPUT" ;;
            file-observer) echo "path=packages/file-observer" >> "$GITHUB_OUTPUT"; echo "mount_binary=" >> "$GITHUB_OUTPUT" ;;
            local-mount) echo "path=packages/local-mount" >> "$GITHUB_OUTPUT"; echo "mount_binary=" >> "$GITHUB_OUTPUT" ;;
            mount-darwin-arm64) echo "path=packages/mount-darwin-arm64" >> "$GITHUB_OUTPUT"; echo "mount_binary=relayfile-mount-darwin-arm64" >> "$GITHUB_OUTPUT" ;;
            mount-darwin-x64) echo "path=packages/mount-darwin-x64" >> "$GITHUB_OUTPUT"; echo "mount_binary=relayfile-mount-darwin-amd64" >> "$GITHUB_OUTPUT" ;;
            mount-linux-arm64) echo "path=packages/mount-linux-arm64" >> "$GITHUB_OUTPUT"; echo "mount_binary=relayfile-mount-linux-arm64" >> "$GITHUB_OUTPUT" ;;
            mount-linux-x64) echo "path=packages/mount-linux-x64" >> "$GITHUB_OUTPUT"; echo "mount_binary=relayfile-mount-linux-amd64" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "Unsupported package: ${{ github.event.inputs.package }}" >&2
              exit 1
              ;;
          esac

      - name: Download relayfile-mount binary
        if: steps.resolve-package.outputs.mount_binary != '' && github.event.inputs.dry_run != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.resolve-package.outputs.mount_binary }}
          path: /tmp/relayfile-mount-binary

      - name: Prepare mount platform package
        if: steps.resolve-package.outputs.mount_binary != '' && github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          mkdir -p "${{ steps.resolve-package.outputs.path }}/bin"
          cp "/tmp/relayfile-mount-binary/${{ steps.resolve-package.outputs.mount_binary }}" "${{ steps.resolve-package.outputs.path }}/bin/relayfile-mount"
          chmod 755 "${{ steps.resolve-package.outputs.path }}/bin/relayfile-mount"

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Dry run check
        if: github.event.inputs.dry_run == 'true'
        working-directory: ${{ steps.resolve-package.outputs.path }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Dry run - would publish ${PACKAGE_NAME}"
          npm publish --dry-run --access public --tag ${{ github.event.inputs.tag }} --ignore-scripts

      - name: Publish to NPM
        if: github.event.inputs.dry_run != 'true'
        working-directory: ${{ steps.resolve-package.outputs.path }}
        run: npm publish --access public --provenance --tag ${{ github.event.inputs.tag }} --ignore-scripts

  create-release:
    name: Create Release
    needs: [build, publish-packages, publish-single, build-mount-binaries]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event.inputs.dry_run != 'true' &&
      needs.build-mount-binaries.result == 'success' &&
      (needs.publish-packages.result == 'success' || needs.publish-single.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Download relayfile-mount binaries
        uses: actions/download-artifact@v4
        with:
          pattern: relayfile-mount-*
          path: mount-binaries
          merge-multiple: true

      - name: Verify mount binaries present
        run: |
          set -euo pipefail
          ls -la mount-binaries/
          for SUFFIX in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            if [ ! -f "mount-binaries/relayfile-mount-${SUFFIX}" ]; then
              echo "ERROR: mount-binaries/relayfile-mount-${SUFFIX} missing"
              exit 1
            fi
          done
          chmod +x mount-binaries/relayfile-mount-*

      - name: Generate checksums
        run: |
          set -euo pipefail
          # Publish a checksums.txt alongside the release binaries. Downstream
          # consumers (e.g. agent-relay's relayfile-binary.ts verifyChecksum)
          # require it and match entries by basename, so we cd into each dir to
          # emit basenames (not paths). This is mandatory for the cloud Daytona
          # mount daemon download to verify; do not drop it.
          ( cd mount-binaries && sha256sum relayfile-mount-* ) > checksums.txt
          ( cd packages/cli/bin && sha256sum relayfile-cli-* ) >> checksums.txt
          cat checksums.txt

      - name: Regenerate release lockfiles
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts
          npm install --prefix packages/sdk/typescript --package-lock-only --ignore-scripts
          npm ci --dry-run
          npm ci --prefix packages/sdk/typescript --dry-run

      - name: Commit version bump and create tag
        env:
          NEW_VERSION: ${{ needs.build.outputs.new_version }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add \
            package.json package-lock.json \
            packages/core/package.json packages/core/CHANGELOG.md \
            packages/sdk/typescript/package.json packages/sdk/typescript/package-lock.json packages/sdk/typescript/CHANGELOG.md \
            packages/agents/package.json packages/agents/CHANGELOG.md \
            packages/cli/package.json packages/cli/CHANGELOG.md \
            packages/file-observer/package.json packages/file-observer/CHANGELOG.md \
            packages/local-mount/package.json packages/local-mount/CHANGELOG.md \
            packages/mount-darwin-arm64/package.json packages/mount-darwin-x64/package.json \
            packages/mount-linux-arm64/package.json packages/mount-linux-x64/package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): v${NEW_VERSION}"
            git push
          fi

          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.new_version }}
          name: v${{ needs.build.outputs.new_version }}
          body: |
            ## relayfile v${{ needs.build.outputs.new_version }}

            ### Packages
            - `@relayfile/core@${{ needs.build.outputs.new_version }}`
            - `@relayfile/sdk@${{ needs.build.outputs.new_version }}`
            - `@relayfile/agents@${{ needs.build.outputs.new_version }}`
            - `relayfile@${{ needs.build.outputs.new_version }}`
            - `@relayfile/file-observer@${{ needs.build.outputs.new_version }}`
            - `@relayfile/local-mount@${{ needs.build.outputs.new_version }}`
            - `@relayfile/mount-darwin-arm64@${{ needs.build.outputs.new_version }}`
            - `@relayfile/mount-darwin-x64@${{ needs.build.outputs.new_version }}`
            - `@relayfile/mount-linux-arm64@${{ needs.build.outputs.new_version }}`
            - `@relayfile/mount-linux-x64@${{ needs.build.outputs.new_version }}`

            ### Install
            ```bash
            npm install @relayfile/sdk@${{ needs.build.outputs.new_version }}
            npm install @relayfile/agents@${{ needs.build.outputs.new_version }}
            npm install relayfile@${{ needs.build.outputs.new_version }}
            npm install @relayfile/file-observer@${{ needs.build.outputs.new_version }}
            npm install @relayfile/local-mount@${{ needs.build.outputs.new_version }}
            npm install @relayfile/sdk@${{ needs.build.outputs.new_version }} --include=optional
            ```

            ### Binaries

            Cross-compiled `relayfile-mount` binaries are attached to this
            release for linux/amd64, linux/arm64, darwin/amd64, and darwin/arm64.
            Downstream consumers (e.g. the cloud Daytona snapshot) can pin a
            specific tag and `curl` the binary directly:

            ```bash
            curl -fSL -o relayfile-mount \
              https://github.com/${{ github.repository }}/releases/download/v${{ needs.build.outputs.new_version }}/relayfile-mount-linux-amd64
            chmod +x relayfile-mount
            ```

            ### Publish Details
            - Dist-tag: `${{ github.event.inputs.tag }}`
            - Provenance: enabled via `npm publish --provenance`
            - Registry: `https://registry.npmjs.org`
          files: |
            packages/cli/bin/relayfile-cli-*
            mount-binaries/relayfile-mount-*
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Summary
    needs: [build, publish-packages, publish-single, build-mount-binaries, create-release]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Summary
        run: |
          {
            echo "## Publish Summary"
            echo ""
            echo "**Package**: \`${{ github.event.inputs.package }}\`"
            echo "**Version**: \`${{ needs.build.outputs.new_version }}\`"
            echo "**NPM Tag**: \`${{ github.event.inputs.tag }}\`"
            echo "**Prerelease**: \`${{ needs.build.outputs.is_prerelease }}\`"
            echo "**Dry Run**: \`${{ github.event.inputs.dry_run }}\`"
            echo "**Provenance**: \`enabled\`"
            echo ""
            echo "### Results"
            echo "| Stage | Status |"
            echo "|-------|--------|"
            echo "| Build & Version | ${{ needs.build.result == 'success' && 'SUCCESS' || 'FAILURE' }} |"
            echo "| Publish All | ${{ needs.publish-packages.result == 'success' && 'SUCCESS' || (needs.publish-packages.result == 'skipped' && 'SKIPPED' || 'FAILURE') }} |"
            echo "| Publish Single | ${{ needs.publish-single.result == 'success' && 'SUCCESS' || (needs.publish-single.result == 'skipped' && 'SKIPPED' || 'FAILURE') }} |"
            echo "| Build Mount Binaries | ${{ needs.build-mount-binaries.result == 'success' && 'SUCCESS' || (needs.build-mount-binaries.result == 'skipped' && 'SKIPPED' || 'FAILURE') }} |"
            echo "| Create Release | ${{ needs.create-release.result == 'success' && 'SUCCESS' || (needs.create-release.result == 'skipped' && 'SKIPPED' || 'FAILURE') }} |"
          } >> "$GITHUB_STEP_SUMMARY"
